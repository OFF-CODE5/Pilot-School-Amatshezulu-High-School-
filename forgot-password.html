<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/forgot-password.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Reset Password - AmatsheZulu</title>

</head>
<body>
    <div class="reset-container">
        <!-- Header -->
        <div class="reset-header">
            <i class="fas fa-key"></i>
            <h1>Reset Password</h1>
            <p>We'll help you get back into your account</p>
        </div>

        <!-- Content -->
        <div class="reset-content">
            <div class="logo">
                <img src="web_img/school_logo/school-logo.jpg" alt="School Logo">
            </div>

            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="step-dot active"></div>
                <div class="step-dot"></div>
                <div class="step-dot"></div>
            </div>

            <!-- Step 1: Email/ID Entry -->
            <div class="form-section active" id="step1">
                <div class="alert alert-info">
                    <i class="fas fa-info-circle"></i>
                    <span>Enter your email address or ID number associated with your account.</span>
                </div>

                <form id="emailForm">
                    <div class="form-group">
                        <label>Email or ID Number</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="text" id="emailOrId" placeholder="your.email@example.com or ID number" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i> Send Verification Code
                    </button>
                </form>
            </div>

            <!-- Step 2: Verification Code -->
            <div class="form-section" id="step2">
                <div class="alert alert-success">
                    <i class="fas fa-check-circle"></i>
                    <span>We've sent a 6-digit verification code to your email address.</span>
                </div>

                <form id="codeForm">
                    <div class="form-group">
                        <label>Enter Verification Code</label>
                        <div class="verification-code">
                            <input type="text" maxlength="1" class="code-input" data-index="0">
                            <input type="text" maxlength="1" class="code-input" data-index="1">
                            <input type="text" maxlength="1" class="code-input" data-index="2">
                            <input type="text" maxlength="1" class="code-input" data-index="3">
                            <input type="text" maxlength="1" class="code-input" data-index="4">
                            <input type="text" maxlength="1" class="code-input" data-index="5">
                        </div>
                    </div>

                    <div class="resend-code">
                        Didn't receive the code? 
                        <button type="button" id="resendBtn" disabled>
                            Resend in <span id="countdown">60</span>s
                        </button>
                    </div>

                    <button type="submit" class="btn btn-primary" style="margin-top: 1.5rem;">
                        <i class="fas fa-check"></i> Verify Code
                    </button>
                </form>
            </div>

            <!-- Step 3: New Password -->
            <div class="form-section" id="step3">
                <div class="alert alert-success">
                    <i class="fas fa-check-circle"></i>
                    <span>Code verified! Now create a new secure password.</span>
                </div>

                <form id="passwordForm">
                    <div class="form-group">
                        <label>New Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="newPassword" placeholder="Create a new password" required>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar">
                                <div class="strength-fill" id="strengthFill"></div>
                            </div>
                            <p id="strengthText" style="margin-top: 0.5rem; color: var(--text-light);"></p>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirmNewPassword" placeholder="Confirm your new password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Reset Password
                    </button>
                </form>
            </div>

            <div class="back-to-login">
                <a href="parent-login.html">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>
    </div>

</body>
</html>
